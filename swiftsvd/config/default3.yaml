model:
  name: "vibevoice/VibeVoice-7B" #"Qwen/Qwen3-32B" "Qwen/Qwen3-14B" #"meta-llama/Llama-2-7b-hf" # "Qwen/Qwen3-8B" #
  dtype: "bfloat16"
  type: "vibevoice"

calib:
  data_path: "/share/a.ammar/sparsesvd/vibevoice/data/calib/mls_eng_10k" #  "/share/a.ammar/sparsesvd/qwen_32b/data/calib/refinedweb"  #/share/a.ammar/sparsesvd/llama1b/data/calib/refinedweb # "/share/a.ammar/sparsesvd/qwen_14b/data/calib/refinedweb" #"/share/d.makhov/data/calib/Qwen/Qwen3-8B" #"/share/a.ammar/sparsesvd/qwen8b/data/calib/refinedweb" #"/share/a.ammar/sparsesvd/llama27b/data/calib/refinedweb"
  dataset: "wikitext"
  num_samples: 256
  seq_len: 1024
  batch_size: 8
  seed: 2023

profiling:
  module_names:
    - "mlp.gate_proj"
    - "self_attn.v_proj"
    - "self_attn.q_proj"
    - "self_attn.k_proj"    
    - "self_attn.o_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
  cr_candidates: [0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7]
  ks_ratios: [1.0, 1.1, 1.2, 1.3, 1.4, 1.5, 1.6, 1.7, 1.8, 1.9, 2.0, 2.1, 2.2, 2.3, 2.4, 2.5, 2.6, 2.7, 2.8, 2.9, 3.0]
  profile_cache: "./layer_prof_vibevoice_mls_eng_10k_v1.json"
  cr_cache: "./cr_layer_prof_vibevoice_mls_eng_10k_v1.json"

compression:
  target_kept_ratio: 0.2  
  param_precision: 50000
  dobi_like: false
  output_dir: "/share/a.ammar/swift_svd/vibevoice_compressed"
  adam_refine_steps: 100
  method: knapsack

evaluation:
  tasks: ["mmlu", "lambada_openai", "race", "sciq", "wikitext", "hellaswag", "piqa", "arc_challenge", "arc_easy"] # ["winogrande", "hellaswag", "piqa", "arc_challenge", "arc_easy"] #["wikitext", "mmlu", "arc_easy", "arc_challenge", "hellaswag", "piqa", "lambada_openai", "race", "sciq"] #["mmlu", "lambada_openai", "race", "sciq", "wikitext"] #["openbookqa", "mathqa", "winogrande", "hellaswag", "piqa", "arc_challenge", "arc_easy"] #["wikitext"] #
  batch_size: 4
  max_batch_size: 32
  device: "cuda"

evaluation_ppl:
  dataset_name: "c4"
